services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: api
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/livez"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    ports:
      - "4000:3000"
    volumes:
      - .:/app
      - /app/tmp
      - go-modules:/go/pkg/mod
    env_file:
      - .env
    networks:
      - api
    restart: unless-stopped

  database:
    container_name: datastore
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "9543:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    networks:
      - api
    restart: unless-stopped

  ngrok:
    container_name: ngrok
    image: ngrok/ngrok:latest
    command: http --url=choice-pretty-leech.ngrok-free.app --host-header=choice-pretty-leech.ngrok-free.app http://api:3000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    networks:
      - api
    restart: unless-stopped
  
  minio:
    container_name: s3
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: devuser
      MINIO_ROOT_PASSWORD: devpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - api
    restart: unless-stopped
  
  mc:
    container_name: mc
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
      api:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 devuser devpassword;
      mc mb myminio/${STORAGE_BUCKET} --ignore-existing;
      mc admin config set myminio notify_webhook:analyze endpoint='http://api:3000/webhooks/minio/object-created' auth_token='${MINIO_WEBHOOK_SECRET:-un-secret-partage}';
      mc admin service restart myminio --json;
      sleep 5;
      mc event remove myminio/${STORAGE_BUCKET} --force || true;
      for ext in jpg png mp4 mov; do
        mc event add myminio/${STORAGE_BUCKET} arn:minio:sqs::analyze:webhook --event put --suffix .$$ext -p;
      done;
      "
    networks:
      - api

volumes:
  go-modules:
  database_data:
  minio_data:
networks:
  api:
    name: go